<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Feature Graphic Generator</title></head>
<body style="margin:0;background:#222;display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px">
<canvas id="c" width="1024" height="500" style="border-radius:8px;max-width:100%"></canvas>
<button onclick="download()" style="padding:12px 32px;font-size:16px;background:#ff6b9d;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700">PNG 다운로드 (1024×500)</button>
<script>
const c = document.getElementById('c')
const ctx = c.getContext('2d')
const W = 1024, H = 500

// ── 배경 그라데이션 (핑크 → 퍼플) ─────────────────
const bg = ctx.createLinearGradient(0, 0, W, H)
bg.addColorStop(0, '#ff5a93')
bg.addColorStop(0.55, '#e056a0')
bg.addColorStop(1, '#a855e8')
ctx.fillStyle = bg
ctx.fillRect(0, 0, W, H)

// ── 배경 장식 원 ─────────────────────────────────
function softCircle(x, y, r, alpha) {
  ctx.save()
  ctx.globalAlpha = alpha
  ctx.beginPath()
  ctx.arc(x, y, r, 0, Math.PI * 2)
  ctx.fillStyle = '#fff'
  ctx.fill()
  ctx.restore()
}
softCircle(940, 60, 140, 0.06)
softCircle(880, 460, 200, 0.05)
softCircle(80, 80, 100, 0.06)
softCircle(60, 460, 130, 0.05)
softCircle(500, 540, 200, 0.04)

// ── 로고 (다이아몬드 반지 + 클릭 커서) ─────────────────
const cx = 220, cy = 250 // 로고 중심
const ringR = 100        // 반지 반경
const ringW = 28         // 반지 두께

// 반지 (그라데이션 원) ─ 끝부분이 끊어진 형태(아크)
ctx.save()
ctx.translate(cx, cy)
const ringGrad = ctx.createLinearGradient(-ringR, -ringR, ringR, ringR)
ringGrad.addColorStop(0, '#fff')
ringGrad.addColorStop(0.6, '#fff5fa')
ringGrad.addColorStop(1, '#ffe0ee')
ctx.strokeStyle = ringGrad
ctx.lineWidth = ringW
ctx.lineCap = 'round'
ctx.beginPath()
ctx.arc(0, 0, ringR, -Math.PI * 0.45, Math.PI * 1.3, false)
ctx.stroke()

// 반지 하이라이트 점
ctx.beginPath()
ctx.arc(-ringR * 0.7, -ringR * 0.4, 7, 0, Math.PI * 2)
ctx.fillStyle = 'rgba(255,255,255,0.85)'
ctx.fill()

// 다이아몬드 (반지 윗부분)
const dy = -ringR - 14   // 다이아 위치
ctx.save()
ctx.translate(0, dy)
const diaGrad = ctx.createLinearGradient(0, -38, 0, 18)
diaGrad.addColorStop(0, '#fff')
diaGrad.addColorStop(1, '#ffd6e8')
ctx.fillStyle = diaGrad
// 다이아 외곽: 위 평평한 사다리꼴 + 아래 삼각형
ctx.beginPath()
ctx.moveTo(-44, -32)
ctx.lineTo(44, -32)
ctx.lineTo(58, -8)
ctx.lineTo(0, 36)
ctx.lineTo(-58, -8)
ctx.closePath()
ctx.fill()
// 다이아 면 라인
ctx.strokeStyle = 'rgba(255,107,157,0.35)'
ctx.lineWidth = 1.5
ctx.beginPath()
ctx.moveTo(-44, -32); ctx.lineTo(-15, -8); ctx.lineTo(-58, -8)
ctx.moveTo(44, -32); ctx.lineTo(15, -8); ctx.lineTo(58, -8)
ctx.moveTo(-15, -8); ctx.lineTo(0, 36); ctx.lineTo(15, -8)
ctx.moveTo(-15, -8); ctx.lineTo(15, -8)
ctx.stroke()
ctx.restore()

// 클릭 커서 (반지 우측 하단)
ctx.translate(ringR * 0.78, ringR * 0.62)
// 클릭 효과 라인 (커서 주변 작은 선들)
ctx.strokeStyle = '#fff'
ctx.lineWidth = 4
ctx.lineCap = 'round'
const sparks = [
  [-22, -18, -10, -8],
  [-26, 6, -14, 6],
  [-22, 26, -10, 18],
  [4, -26, 4, -14],
]
sparks.forEach(([x1, y1, x2, y2]) => {
  ctx.beginPath()
  ctx.moveTo(x1, y1)
  ctx.lineTo(x2, y2)
  ctx.stroke()
})
// 커서 화살표
ctx.fillStyle = '#fff'
ctx.beginPath()
ctx.moveTo(0, 0)
ctx.lineTo(48, 18)
ctx.lineTo(28, 26)
ctx.lineTo(40, 52)
ctx.lineTo(28, 58)
ctx.lineTo(16, 32)
ctx.lineTo(0, 44)
ctx.closePath()
ctx.fill()
ctx.strokeStyle = 'rgba(255,107,157,0.3)'
ctx.lineWidth = 1.5
ctx.stroke()
ctx.restore()

// ── 텍스트 영역 (오른쪽) ─────────────────────────
const tx = 460  // 텍스트 영역 시작 X

// 메인 타이틀: 결혼준비 딸깍
ctx.fillStyle = '#fff'
ctx.font = 'bold 76px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif'
ctx.textAlign = 'left'
ctx.textBaseline = 'middle'
ctx.shadowColor = 'rgba(0,0,0,0.18)'
ctx.shadowBlur = 14
ctx.shadowOffsetY = 2
ctx.fillText('결혼준비 딸깍', tx, 175)

// 서브 카피
ctx.shadowBlur = 0; ctx.shadowOffsetY = 0
ctx.fillStyle = 'rgba(255,255,255,0.95)'
ctx.font = '26px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif'
ctx.fillText('스마트한 결혼준비의 시작,', tx, 240)
ctx.fillText('비용계산부터 일정관리까지 딸깍!', tx, 280)

// 하단 태그 박스
const tagY = 330
const tagText = '일정관리 체크리스트  ·  비용 계산기  ·  신혼여행 체크'
ctx.font = 'bold 18px "Apple SD Gothic Neo", "Malgun Gothic", sans-serif'
const tagW = ctx.measureText(tagText).width + 56
ctx.fillStyle = 'rgba(255,255,255,0.18)'
ctx.beginPath()
ctx.roundRect(tx, tagY, tagW, 50, 25)
ctx.fill()
ctx.strokeStyle = 'rgba(255,255,255,0.35)'
ctx.lineWidth = 1.5
ctx.stroke()
ctx.fillStyle = '#fff'
ctx.textAlign = 'center'
ctx.fillText(tagText, tx + tagW / 2, tagY + 26)

function download() {
  const a = document.createElement('a')
  a.download = 'feature_graphic_1024x500.png'
  a.href = c.toDataURL('image/png')
  a.click()
}
</script>
</body>
</html>
